<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlawz Crew</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Orbitron',sans-serif;background:black;color:gold;text-align:center}
section{padding:30px;border-bottom:1px solid gold}
button{background:gold;color:black;padding:10px;margin:5px;cursor:pointer}
input,textarea{padding:10px;margin:5px;width:80%}

.card{
 background:rgba(0,0,0,.7);
 border:1px solid gold;
 margin:15px auto;
 padding:15px;
 max-width:400px;
}
.card img{
 width:100%;
 height:200px;
 object-fit:cover;
 border:2px solid gold;
}

.rank-Leader{color:red}
.rank-Rider{color:gold}
.rank-Mechanic{color:cyan}
.rank-Prospect{color:gray}

.admin{display:none}
</style>
</head>

<body>

<h1>OUTLAWZ</h1>

<!-- JOIN -->
<section>
<h2>Join Outlawz</h2>
<input id="name" placeholder="Name"><br>
<input id="bike" placeholder="Bike"><br>
<textarea id="msg" placeholder="Why join?"></textarea><br>
<input type="file" id="photo"><br>
<button onclick="join()">Join</button>
<p id="status"></p>
</section>

<!-- MEMBERS -->
<section>
<h2>Members</h2>
<div id="members"></div>
</section>

<!-- LOGIN -->
<section>
<h2>Founder Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<div class="admin" id="admin">
<h3>Join Requests</h3>
<div id="requests"></div>
</div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_CONFIG",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// JOIN
window.join = async ()=>{
 let name=document.getElementById("name").value;
 let bike=document.getElementById("bike").value;
 let msg=document.getElementById("msg").value;
 let file=document.getElementById("photo").files[0];

 if(!name||!bike||!file)return;

 const storageRef=ref(storage,"profiles/"+Date.now()+file.name);
 await uploadBytes(storageRef,file);
 const url=await getDownloadURL(storageRef);

 await addDoc(collection(db,"requests"),{
  name,bike,msg,photo:url,status:"pending"
 });

 document.getElementById("status").innerText="Request Sent 🔥";
};

// LOGIN
window.login=()=>{
 let email=document.getElementById("email").value;
 let password=document.getElementById("password").value;

 signInWithEmailAndPassword(auth,email,password)
  .then(()=>alert("Access Granted"))
  .catch(()=>alert("Error"));
};

// AUTH STATE
onAuthStateChanged(auth,user=>{
 if(user){
  admin.style.display="block";
  loadRequests();
 }
});

// LOAD REQUESTS
async function loadRequests(){
 let container=document.getElementById("requests");
 container.innerHTML="";

 let snap=await getDocs(collection(db,"requests"));

 snap.forEach(docu=>{
  let d=docu.data();

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
   <img src="${d.photo}">
   <b>${d.name}</b> (${d.bike})<br>
   ${d.msg}<br>

   <select id="rank-${docu.id}">
    <option>Prospect</option>
    <option>Rider</option>
    <option>Mechanic</option>
    <option>Leader</option>
   </select>

   <button onclick="approve('${docu.id}')">Approve</button>
  `;

  container.appendChild(div);
 });
}

// APPROVE
window.approve=async(id)=>{
 let rank=document.getElementById(`rank-${id}`).value;

 await updateDoc(doc(db,"requests",id),{
  status:"approved",
  rank:rank
 });

 loadMembers();
 loadRequests();
};

// LOAD MEMBERS
async function loadMembers(){
 let container=document.getElementById("members");
 container.innerHTML="";

 let snap=await getDocs(collection(db,"requests"));

 snap.forEach(docu=>{
  let d=docu.data();

  if(d.status==="approved"){
   let div=document.createElement("div");
   div.className="card";

   div.innerHTML=`
    <img src="${d.photo}">
    <b>${d.name}</b><br>
    🏍 ${d.bike}<br>
    <span class="rank-${d.rank}">👑 ${d.rank}</span>
   `;

   container.appendChild(div);
  }
 });
}

loadMembers();

</script>

</body>
</html>
