<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlawz Crew</title>

<style>
body{background:black;color:gold;font-family:Arial;text-align:center}
section{padding:20px;border-bottom:1px solid gold}
input,textarea{padding:8px;margin:5px;width:80%}
button{padding:8px;background:gold;color:black;cursor:pointer;margin:5px}

.card{background:#111;border:1px solid gold;margin:10px auto;padding:10px;max-width:400px}
.card img{width:100%;height:200px;object-fit:cover}

#gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.gallery-img{width:100%;height:120px;object-fit:cover;border:2px solid gold}

.admin{display:none}
</style>
</head>

<body>

<h1>OUTLAWZ</h1>

<!-- ADMIN LOGIN -->
<section>
<h2>Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</section>

<!-- JOIN -->
<section>
<h2>Join Outlawz</h2>
<input id="name" placeholder="Name"><br>
<input id="bike" placeholder="Bike"><br>
<textarea id="msg" placeholder="Why join?"></textarea><br>
<input type="file" id="photo"><br>
<button onclick="join()">Join</button>
</section>

<!-- MEMBERS -->
<section>
<h2>Members</h2>
<div id="members"></div>
</section>

<!-- GALLERY -->
<section>
<h2>Gallery</h2>
<div id="gallery"></div>

<div class="admin" id="galleryAdmin">
<input type="file" id="gimg" multiple>
<input id="caption" placeholder="Caption">
<button onclick="uploadGallery()">Upload</button>
</div>
</section>

<!-- CHAT -->
<section>
<h2>Crew Chat</h2>
<div id="chatBox"></div>
<input id="chatMsg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</section>

<!-- EVENTS -->
<section>
<h2>Ride Events</h2>
<div id="events"></div>

<div class="admin">
<input id="eventText" placeholder="New Event">
<button onclick="addEvent()">Add Event</button>
</div>
</section>

<!-- ACTIVITY -->
<section>
<h2>Activity Feed</h2>
<div id="feed"></div>
</section>

<!-- ADMIN PANEL -->
<section class="admin" id="admin">
<h2>Join Requests</h2>
<div id="requests"></div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_ID",
  storageBucket:"YOUR_BUCKET"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);

/* ADMIN LOGIN (demo only) */
window.adminLogin=()=>{
 if(user.value==="Death" && pass.value==="death1313"){
  document.querySelectorAll(".admin").forEach(x=>x.style.display="block");
  loadRequests();
 }
}

/* JOIN */
window.join=async()=>{
 let file=photo.files[0];
 if(!name.value||!bike.value||!file)return;

 let r=ref(storage,"profiles/"+Date.now()+file.name);
 await uploadBytes(r,file);
 let url=await getDownloadURL(r);

 let id="OUT"+Math.floor(Math.random()*10000);

 await addDoc(collection(db,"members"),{
  name:name.value,bike:bike.value,msg:msg.value,
  photo:url,status:"pending",id:id
 });

 addFeed(name.value+" requested to join 🔥");
}

/* APPROVAL */
async function loadRequests(){
 let snap=await getDocs(collection(db,"members"));
 requests.innerHTML="";
 snap.forEach(d=>{
  let data=d.data();
  if(data.status==="pending"){
   let div=document.createElement("div");
   div.className="card";
   div.innerHTML=`
    <img src="${data.photo}">
    ${data.name} (${data.bike})
    <select id="r-${d.id}">
     <option>Prospect</option><option>Rider</option><option>Leader</option>
    </select>
    <button onclick="approve('${d.id}')">Approve</button>
   `;
   requests.appendChild(div);
  }
 });
}

window.approve=async(id)=>{
 let rank=document.getElementById("r-"+id).value;
 await updateDoc(doc(db,"members",id),{status:"approved",rank});
 addFeed("Member approved 👑");
 loadMembers();
 loadRequests();
}

/* MEMBERS */
async function loadMembers(){
 let snap=await getDocs(collection(db,"members"));
 members.innerHTML="";
 snap.forEach(d=>{
  let x=d.data();
  if(x.status==="approved"){
   let div=document.createElement("div");
   div.className="card";
   div.innerHTML=`
    <img src="${x.photo}">
    <b>${x.name}</b><br>
    🏍 ${x.bike}<br>
    👑 ${x.rank}<br>
    🪪 ${x.id}<br>
    ❤️ <span id="like-${d.id}">${x.likes||0}</span>
    <button onclick="likeMember('${d.id}',${x.likes||0})">Like</button>
   `;
   members.appendChild(div);
  }
 });
}
window.likeMember=async(id,count)=>{
 await updateDoc(doc(db,"members",id),{likes:count+1});
 addFeed("Someone liked a member ❤️");
 loadMembers();
}

/* GALLERY */
window.uploadGallery=async()=>{
 for(let f of gimg.files){
  let r=ref(storage,"gallery/"+Date.now()+f.name);
  await uploadBytes(r,f);
  let url=await getDownloadURL(r);
  await addDoc(collection(db,"gallery"),{img:url,cap:caption.value,likes:0});
 }
 addFeed("New gallery images added 📸");
 loadGallery();
}

async function loadGallery(){
 let snap=await getDocs(collection(db,"gallery"));
 gallery.innerHTML="";
 snap.forEach(d=>{
  let x=d.data();
  let img=document.createElement("div");
  img.innerHTML=`
   <img src="${x.img}" class="gallery-img">
   <small>${x.cap||""}</small><br>
   ❤️ ${x.likes}
  `;
  gallery.appendChild(img);
 });
}

/* CHAT */
window.sendMsg=async()=>{
 if(!chatMsg.value)return;
 await addDoc(collection(db,"chat"),{msg:chatMsg.value});
 chatMsg.value="";
}
async function loadChat(){
 let snap=await getDocs(collection(db,"chat"));
 chatBox.innerHTML="";
 snap.forEach(d=>{
  let p=document.createElement("p");
  p.innerText=d.data().msg;
  chatBox.appendChild(p);
 });
}
setInterval(loadChat,3000);

/* EVENTS */
window.addEvent=async()=>{
 await addDoc(collection(db,"events"),{text:eventText.value});
 addFeed("New ride event added 🏍");
 loadEvents();
}
async function loadEvents(){
 let snap=await getDocs(collection(db,"events"));
 events.innerHTML="";
 snap.forEach(d=>{
  let p=document.createElement("p");
  p.innerText=d.data().text;
  events.appendChild(p);
 });
}

/* ACTIVITY */
async function addFeed(text){
 await addDoc(collection(db,"feed"),{text});
 loadFeed();
}
async function loadFeed(){
 let snap=await getDocs(collection(db,"feed"));
 feed.innerHTML="";
 snap.forEach(d=>{
  let p=document.createElement("p");
  p.innerText=d.data().text;
  feed.appendChild(p);
 });
}

/* INIT */
loadMembers();
loadGallery();
loadEvents();
loadFeed();
</script>

</body>
</html>
