<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlawz Crew</title>

<style>
body{background:black;color:gold;font-family:Arial;text-align:center}
section{padding:20px;border-bottom:1px solid gold}
input,textarea{padding:10px;margin:5px;width:80%}
button{padding:8px;background:gold;color:black;margin:5px;cursor:pointer}

.card{
 background:#111;
 border:1px solid gold;
 margin:10px auto;
 padding:10px;
 max-width:400px;
 cursor:pointer;
}
.card img{width:100%;height:200px;object-fit:cover}

#gallery{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
 gap:10px;
}
.gallery-img{
 width:100%;
 height:120px;
 object-fit:cover;
 border:2px solid gold;
}

.admin{display:none}

/* FOUNDER */
.founder-card{
 background:#111;
 border:2px solid gold;
 padding:20px;
 max-width:400px;
 margin:auto;
 box-shadow:0 0 20px orange;
}
.alias{color:red;font-weight:bold}
.tagline{color:orange;font-style:italic}

/* MODALS */
#imgModal,#profileModal{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.95);
 justify-content:center;
 align-items:center;
 z-index:999;
}
</style>
</head>

<body>

<h1>OUTLAWZ</h1>

<!-- FOUNDER -->
<section>
<h2>👑 Founder</h2>
<div class="founder-card">
<h3>Manjit Ojha</h3>
<p class="alias">AKA: DEATH</p>
<p class="tagline">Together We Hit Hard</p>
</div>
</section>

<!-- ADMIN LOGIN -->
<section>
<h2>Admin Login</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="adminLogin()">Login</button>
</section>

<!-- JOIN -->
<section>
<h2>Join Outlawz</h2>
<input id="name" placeholder="Name"><br>
<input id="bike" placeholder="Bike"><br>
<input type="file" id="photo"><br>
<button onclick="join()">Join</button>
</section>

<!-- MEMBERS -->
<section>
<h2>Members</h2>
<div id="members"></div>
</section>

<!-- GALLERY -->
<section>
<h2>Gallery</h2>
<div id="gallery"></div>

<div class="admin" id="galleryAdmin">
<input type="file" id="gimg" multiple><br>
<input id="gcap" placeholder="Caption"><br>
<button onclick="uploadGallery()">Upload</button>
</div>
</section>

<!-- ADMIN PANEL -->
<section class="admin" id="admin">
<h2>Join Requests</h2>
<div id="requests"></div>
</section>

<!-- IMAGE MODAL -->
<div id="imgModal">
<span onclick="closeImage()" style="position:absolute;top:20px;right:30px;font-size:30px;color:white;cursor:pointer">✖</span>
<img id="modalImg" style="max-width:90%;max-height:90%">
</div>

<!-- PROFILE MODAL -->
<div id="profileModal">
<div style="background:black;padding:20px;border:2px solid gold;width:90%;max-width:400px">
<span onclick="closeProfile()" style="float:right;color:red;cursor:pointer">✖</span>
<img id="pImg" style="width:100%;height:200px;object-fit:cover"><br>
<h2 id="pName"></h2>
<p id="pBike"></p>
<p id="pRank"></p>
<p id="pId"></p>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
 apiKey:"YOUR_KEY",
 authDomain:"YOUR_DOMAIN",
 projectId:"YOUR_ID",
 storageBucket:"YOUR_BUCKET"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);

let isAdmin=false;

/* ADMIN LOGIN */
window.adminLogin=()=>{
 if(user.value==="Death" && pass.value==="death1313"){
  isAdmin=true;
  document.querySelectorAll(".admin").forEach(x=>x.style.display="block");
  loadRequests();
  loadGallery();
 }
}

/* JOIN */
window.join=async()=>{
 let file=photo.files[0];
 if(!name.value||!bike.value||!file)return;

 let r=ref(storage,"profiles/"+Date.now()+file.name);
 await uploadBytes(r,file);
 let url=await getDownloadURL(r);

 let id="OUT"+Math.floor(Math.random()*10000);

 await addDoc(collection(db,"members"),{
  name:name.value,bike:bike.value,photo:url,status:"pending",id
 });

 alert("Request Sent");
}

/* LOAD REQUESTS */
async function loadRequests(){
 let snap=await getDocs(collection(db,"members"));
 requests.innerHTML="";
 snap.forEach(d=>{
  let x=d.data();
  if(x.status==="pending"){
   let div=document.createElement("div");
   div.className="card";
   div.innerHTML=`
    <img src="${x.photo}">
    ${x.name} (${x.bike})
    <select id="r-${d.id}">
     <option>Prospect</option>
     <option>Rider</option>
     <option>Leader</option>
    </select>
    <button onclick="approve('${d.id}')">Approve</button>
   `;
   requests.appendChild(div);
  }
 });
}

/* APPROVE */
window.approve=async(id)=>{
 let rank=document.getElementById("r-"+id).value;
 await updateDoc(doc(db,"members",id),{status:"approved",rank});
 loadMembers();
 loadRequests();
}

/* MEMBERS */
async function loadMembers(){
 let snap=await getDocs(collection(db,"members"));
 members.innerHTML="";
 snap.forEach(d=>{
  let x=d.data();
  if(x.status==="approved"){
   let div=document.createElement("div");
   div.className="card";
   div.onclick=()=>openProfile(x);
   div.innerHTML=`
    <img src="${x.photo}">
    <b>${x.name}</b><br>
    🏍 ${x.bike}<br>
    👑 ${x.rank}<br>
   `;
   members.appendChild(div);
  }
 });
}

/* PROFILE */
window.openProfile=(x)=>{
 profileModal.style.display="flex";
 pImg.src=x.photo;
 pName.innerText=x.name;
 pBike.innerText="🏍 "+x.bike;
 pRank.innerText="👑 "+x.rank;
 pId.innerText="🪪 "+x.id;
}
window.closeProfile=()=>profileModal.style.display="none";

/* GALLERY */
window.uploadGallery=async()=>{
 let files=gimg.files;
 let cap=gcap.value;

 for(let f of files){
  let r=ref(storage,"gallery/"+Date.now()+f.name);
  await uploadBytes(r,f);
  let url=await getDownloadURL(r);

  await addDoc(collection(db,"gallery"),{img:url,caption:cap});
 }

 loadGallery();
}

async function loadGallery(){
 let snap=await getDocs(collection(db,"gallery"));
 gallery.innerHTML="";

 snap.forEach(d=>{
  let x=d.data();
  let div=document.createElement("div");
  div.style.position="relative";

  div.innerHTML=`
   <img src="${x.img}" class="gallery-img" onclick="openImage('${x.img}')">
   <small>${x.caption||""}</small>
  `;

  if(isAdmin){
   let btn=document.createElement("button");
   btn.innerText="X";
   btn.style.position="absolute";
   btn.style.top="5px";
   btn.style.right="5px";
   btn.style.background="red";
   btn.onclick=()=>deleteImage(d.id);
   div.appendChild(btn);
  }

  gallery.appendChild(div);
 });
}

window.deleteImage=async(id)=>{
 if(confirm("Delete image?")){
  await deleteDoc(doc(db,"gallery",id));
  loadGallery();
 }
}

/* IMAGE VIEW */
window.openImage=(src)=>{
 imgModal.style.display="flex";
 modalImg.src=src;
}
window.closeImage=()=>imgModal.style.display="none";

/* INIT */
loadMembers();
loadGallery();

</script>

</body>
</html>
