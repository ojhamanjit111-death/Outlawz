<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlawz Crew</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Orbitron',sans-serif;
    background:black;
    color:gold;
    overflow-x:hidden;
}

/* 🔥 Animated Background */
body::before{
    content:"";
    position:fixed;
    width:100%;height:100%;
    background:radial-gradient(circle at 50% 100%, #ff4500 0%, #ff0000 30%, #000 70%);
    animation:fireMove 4s infinite alternate ease-in-out;
    z-index:-1;opacity:.4;
}
@keyframes fireMove{from{transform:scale(1)}to{transform:scale(1.08)}}

/* Loader */
#loader{
 position:fixed;
 width:100%;height:100%;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:28px;
 z-index:9999;
}

header{
 text-align:center;
 padding:25px;
 border-bottom:2px solid gold;
}
header h1{font-size:42px;letter-spacing:3px}

section{
 padding:40px 20px;
 text-align:center;
 border-bottom:1px solid rgba(255,215,0,0.3);
}

button{
 background:gold;color:black;
 padding:10px 16px;border:none;
 margin:5px;cursor:pointer;
 font-weight:bold;
 transition:.3s;
}
button:hover{box-shadow:0 0 15px gold;transform:scale(1.05)}

input,textarea{
 width:90%;max-width:400px;
 padding:10px;margin:8px;
}

/* Cards */
.card{
 background:rgba(0,0,0,.7);
 border:1px solid gold;
 padding:15px;margin:15px auto;
 max-width:600px;
 box-shadow:0 0 15px orange;
}
.card img{width:100%;margin-top:10px}

/* Gallery */
#gallery{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
 gap:12px;
 max-width:1000px;margin:auto;
}
.gallery-img{
 width:100%;height:130px;
 object-fit:cover;
 border:2px solid gold;
 cursor:pointer;
 transition:.3s;
}
.gallery-img:hover{transform:scale(1.1)}

/* Modal */
#modal{
 display:none;
 position:fixed;
 width:100%;height:100%;
 background:rgba(0,0,0,.95);
 justify-content:center;
 align-items:center;
 z-index:999;
}
#modal img{max-width:90%;max-height:90%}

.admin{display:none;margin-top:20px}
</style>
</head>

<body>

<div id="loader">OUTLAWZ LOADING...</div>

<header>
<h1>OUTLAWZ</h1>
<p>Together We Hit Hard</p>
</header>

<section>
<h2>Founder</h2>
<h3>Manjit Ojha</h3>
<p style="color:orange">DEATH</p>
</section>

<section>
<h2>🔥 Announcements</h2>
<div id="notices"></div>
</section>

<section>
<h2>🔥 Gallery</h2>
<div id="gallery"></div>
</section>

<section>
<h2>Founder Login</h2>
<input type="password" id="pass" placeholder="Password">
<br>
<button onclick="login()">Login</button>

<div class="admin" id="admin">
<h3>Post</h3>
<textarea id="text"></textarea><br>
<input type="file" id="img"><br>
<button onclick="addPost()">Add</button>

<h3>Upload Images</h3>
<input type="file" id="gimg" multiple><br>
<button onclick="addGallery()">Upload</button>
</div>
</section>

<div id="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script>
// ⚠️ Demo only (still not secure)
const PASS="death1313";
let admin=false;

let notices=JSON.parse(localStorage.getItem("n"))||[];
let gallery=JSON.parse(localStorage.getItem("g"))||[];

window.onload=()=>{
 setTimeout(()=>document.getElementById("loader").style.display="none",1500);
 render();
}

function login(){
 if(document.getElementById("pass").value===PASS){
  admin=true;
  document.getElementById("admin").style.display="block";
 }
}

function save(){
 localStorage.setItem("n",JSON.stringify(notices));
 localStorage.setItem("g",JSON.stringify(gallery));
 render();
}

function addPost(){
 let t=document.getElementById("text").value.trim();
 let f=document.getElementById("img").files[0];
 if(!t && !f) return;

 let d=new Date().toLocaleString();
 if(f){
  let r=new FileReader();
  r.onload=e=>{
   notices.unshift({t,d,i:e.target.result});
   save();
  }
  r.readAsDataURL(f);
 }else{
  notices.unshift({t,d});save();
 }
}

function addGallery(){
 let files=document.getElementById("gimg").files;
 [...files].forEach(f=>{
  let r=new FileReader();
  r.onload=e=>{
   gallery.unshift(e.target.result);
   save();
  }
  r.readAsDataURL(f);
 });
}

function render(){
 let n=document.getElementById("notices");
 n.innerHTML="";
 notices.forEach((x,i)=>{
  let div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<b>${x.d}</b><br>${x.t||""}`;
  if(x.i) div.innerHTML+=`<img src='${x.i}'>`;
  if(admin) div.innerHTML+=`<button onclick='delN(${i})'>X</button>`;
  n.appendChild(div);
 });

 let g=document.getElementById("gallery");
 g.innerHTML="";
 gallery.forEach((img,i)=>{
  let el=document.createElement("img");
  el.src=img;
  el.className="gallery-img";
  el.onclick=()=>{modalImg.src=img;modal.style.display="flex"};
  g.appendChild(el);
 });
}

function delN(i){notices.splice(i,1);save();}
</script>

</body>
</html>
